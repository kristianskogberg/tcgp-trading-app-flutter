# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "images/icon/app_icon.png"

  android: "launcher_icon"
  # image_path_android: "images/icon/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "images/icon/background.png"
  adaptive_icon_foreground: "images/icon/foreground.png"
  adaptive_icon_foreground_inset:
    22
    # adaptive_icon_monochrome: "assets/icon/monochrome.png"

  ios: true
  # image_path_ios: "images/icon/app_icon.png"
  remove_alpha_ios: true
  # image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  # image_path_ios_tinted_grayscale: "assets/icon/icon_tinted.png"
  # desaturate_tinted_to_grayscale_ios: true
  # background_color_ios: "#ffffff"

  web:
    generate: true
    image_path: "images/icon/app_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "images/icon/app_icon.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "images/icon/app_icon.png"
